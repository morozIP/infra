 
 input {
   beats {
     port => 5044
   }
 }
 
filter {
  json {
    source => "message"
  }

  # If Filebeat adds host.name (object), replace host with its name string
  if [host] and [host][name] {
    mutate {
      replace => { "host" => "%{[host][name]}" }
    }
  }

  mutate {
    add_field => { "sample" => "Hello world, from %{host}" }
  }
}
 
 output {
     stdout { codec => json }
     elasticsearch {
       hosts => ["http://elasticsearch:9200"]
       index => "%{[@metadata][beat]}-%{+YYYY.MM.dd}"
     }
   
 }
 